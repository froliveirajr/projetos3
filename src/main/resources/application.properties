spring.application.name=edenred
server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:edencalc;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.admin.cnpj=${APP_ADMIN_CNPJ:00.000.000/0001-00}
app.admin.senha=${APP_ADMIN_SENHA:admin123}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
