spring.application.name=edenred
server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:edencalc;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.admin.cnpj=${APP_ADMIN_CNPJ:00.000.000/0001-00}
app.admin.senha=${APP_ADMIN_SENHA:admin123}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
app.prospeccao.transacoes-padrao=${APP_PROSPECCAO_TRANSACOES_PADRAO:13}
app.prospeccao.vida-util-cartao-padrao=${APP_PROSPECCAO_VIDA_UTIL_CARTAO_PADRAO:3.5}
app.prospeccao.turnover-padrao=${APP_PROSPECCAO_TURNOVER_PADRAO:0.20}
app.prospeccao.reemissao-padrao=${APP_PROSPECCAO_REEMISSAO_PADRAO:0.05}
app.prospeccao.senha-temporaria-prefixo=${APP_PROSPECCAO_SENHA_TEMPORARIA_PREFIXO:eden}
